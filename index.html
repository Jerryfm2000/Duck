<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duck Hunter: Arcade Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #4ec0ca;
            font-family: 'Press Start 2P', cursive;
            user-select: none;
        }

        canvas { display: block; cursor: crosshair; }

        /* UI Styling */
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            z-index: 5;
            display: none;
        }

        .stat {
            font-size: 19px;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0px #000;
        }

        #lives { color: #ff5252; }

        /* Overlays */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
            text-align: center;
            backdrop-filter: blur(4px);
        }

        h1 {
            font-size: 40px;
            margin-bottom: 20px;
            color: #ffd700;
            text-shadow: 5px 5px 0px #b8860b;
        }

        p { font-size: 12px; line-height: 2; max-width: 600px; color: #eee; }

        button {
            background: #ff9800;
            border: 4px solid #fff;
            padding: 15px 30px;
            font-family: 'Press Start 2P', cursive;
            font-size: 18px;
            color: white;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 6px 6px 0px #000;
        }

        button:hover {
            background: #e68900;
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0px #000;
        }

        button:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }
    </style>
</head>
<body>

    <div id="start-screen" class="overlay">
        <h1>DUCK HUNTER</h1>
        <p>TAG THE TARGETS!!!<br>
        <span style="color: #ff01ff;">RAINBOW DISCO</span> = 150 PTS<br>
        <span style="color: #ffd700;">GOLDEN DUCK</span> = 50 PTS<br>
        REGULAR DUCKS = 15 PTS</p>
        <button onclick="startGame()">PRESS START</button>
    </div>

    <div id="ui-layer">
        <div class="stat">SCORE: <span id="score">0</span></div>
        <div class="stat">LIVES: <span id="lives">5</span></div>
    </div>

    <div id="game-over" class="overlay" style="display: none;">
        <h1 style="color: #ff5252;">GAME OVER</h1>
        <p id="final-score"></p>
        <button onclick="resetGame()">RETRY?</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over');
        const uiLayer = document.getElementById('ui-layer');
        const finalScoreElement = document.getElementById('final-score');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let lives = 5;
        let ducks = [];
        let particles = [];
        let gameActive = false;
        let shakeTime = 0;
        let animationId;
        
        const names = ["Enzo", "Jerry", "Isaac", "Dwait", "Mr.E", "Danial", "Aarav", "Jireh", "Ayaan", "Justin"];

        class Duck {
            constructor(isGolden = false, isRainbow = false) {
                this.radius = 35;
                this.isGolden = isGolden;
                this.isRainbow = isRainbow;
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = canvas.height + this.radius;
                
                const difficulty = 1 + (score / 500);
                
                let speedMult = 1;
                if (this.isGolden) speedMult = 2.2;
                if (this.isRainbow) speedMult = 3.5; 

                this.speedY = (Math.random() * 2 + 2) * difficulty * speedMult;
                this.speedX = (Math.random() - 0.5) * 4 * (this.isGolden || this.isRainbow ? 1.5 : 1);
                
                this.rainbowHue = 0;

                if (this.isGolden) {
                    this.bodyColor = "#ffd700";
                    this.wingColor = "#b8860b";
                    this.name = "RICHIE";
                } else if (this.isRainbow) {
                    this.name = "DISCO";
                    this.bodyColor = `hsl(0, 80%, 60%)`;
                    this.wingColor = `hsl(0, 80%, 40%)`;
                } else {
                    this.hue = Math.random() * 360;
                    this.bodyColor = `hsl(${this.hue}, 70%, 60%)`;
                    this.wingColor = `hsl(${this.hue}, 70%, 40%)`;
                    this.name = names[Math.floor(Math.random() * names.length)];
                }
                this.flapOffset = Math.random() * Math.PI * 2;
            }

            draw() {
                ctx.save();
                ctx.shadowBlur = 10;
                ctx.shadowColor = "rgba(0,0,0,0.3)";
                const flap = Math.sin(Date.now() * 0.015 + this.flapOffset);
                
                // Wings
                ctx.fillStyle = this.wingColor;
                [-1, 1].forEach(side => {
                    ctx.save();
                    ctx.translate(this.x + (side * 20), this.y);
                    ctx.rotate(side * -flap * 0.8);
                    ctx.beginPath();
                    ctx.ellipse(side * 15, 0, 30, 12, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                });

                // Body
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.bodyColor;
                ctx.fill();
                ctx.strokeStyle = "#000";
                ctx.lineWidth = 3;
                ctx.stroke();

                // Eyes
                ctx.fillStyle = "white";
                [-12, 12].forEach(offset => {
                    ctx.beginPath();
                    ctx.arc(this.x + offset, this.y - 10, 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                });
                ctx.fillStyle = "black";
                [-12, 12].forEach(offset => {
                    ctx.beginPath();
                    ctx.arc(this.x + offset, this.y - 10, 3, 0, Math.PI * 2);
                    ctx.fill();
                });

                // Beak
                ctx.fillStyle = "#FF9800";
                ctx.beginPath();
                ctx.moveTo(this.x - 12, this.y + 5);
                ctx.lineTo(this.x + 12, this.y + 5);
                ctx.lineTo(this.x, this.y + 28);
                ctx.fill();
                ctx.stroke();

                // Name Label
                ctx.fillStyle = "white";
                ctx.font = "12px 'Press Start 2P'";
                ctx.textAlign = "center";
                ctx.lineWidth = 4;
                ctx.strokeText(this.name, this.x, this.y - 50);
                ctx.fillText(this.name, this.x, this.y - 50);
                ctx.restore();
            }

            update() {
                this.y -= this.speedY;
                this.x += this.speedX;
                if (this.isRainbow) {
                    this.rainbowHue = (this.rainbowHue + 10) % 360;
                    this.bodyColor = `hsl(${this.rainbowHue}, 80%, 60%)`;
                    this.wingColor = `hsl(${this.rainbowHue}, 80%, 40%)`;
                }
                if (this.x - this.radius < 0 || this.x + this.radius > canvas.width) this.speedX *= -1;
            }
        }

        function startGame() {
            gameActive = true;
            startScreen.style.display = "none";
            uiLayer.style.display = "block";
            if (!animationId) animate();
        }

        function createFlash(x, y) {
            particles.push({x, y, life: 1.0});
        }

        function handleClicks(e) {
            if (!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            createFlash(mouseX, mouseY);
            let hit = false;

            for (let i = ducks.length - 1; i >= 0; i--) {
                const d = ducks[i];
                if (Math.hypot(mouseX - d.x, mouseY - d.y) < d.radius + 15) {
                    if (d.isRainbow) score += 150;
                    else if (d.isGolden) score += 50;
                    else score += 15;
                    
                    scoreElement.innerText = score;
                    ducks.splice(i, 1);
                    hit = true;
                    break;
                }
            }
            if (!hit) shakeTime = 10;
        }

        function resetGame() {
            score = 0; 
            lives = 5; 
            ducks = [];
            particles = [];
            scoreElement.innerText = "0";
            livesElement.innerText = "5";
            gameOverScreen.style.display = "none";
            gameActive = true;
        }

        function animate() {
            ctx.save();
            if (shakeTime > 0) {
                ctx.translate(Math.random() * 10 - 5, Math.random() * 10 - 5);
                shakeTime--;
            }

            // Draw Sky
            ctx.fillStyle = "#4ec0ca";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw Grass
            ctx.fillStyle = "#3ca33c";
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);

            if (gameActive) {
                // Spawn Logic
                if (Math.random() < 0.025) {
                    const rand = Math.random();
                    ducks.push(new Duck(rand < 0.07, rand > 0.98));
                }

                // Update & Draw Ducks
                for (let i = ducks.length - 1; i >= 0; i--) {
                    ducks[i].update();
                    ducks[i].draw();
                    
                    if (ducks[i].y + ducks[i].radius < 0) {
                        // Regular ducks cost lives, special ones don't
                        if (!ducks[i].isGolden && !ducks[i].isRainbow) {
                            lives--;
                            livesElement.innerText = lives;
                        }
                        ducks.splice(i, 1);
                        
                        if (lives <= 0) {
                            gameActive = false;
                            gameOverScreen.style.display = "flex";
                            finalScoreElement.innerText = `FINAL SCORE: ${score}`;
                        }
                    }
                }
            }

            // Muzzle Flashes
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                ctx.fillStyle = `rgba(255, 255, 255, ${p.life})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 25 * (1 - p.life + 1), 0, Math.PI * 2);
                ctx.fill();
                p.life -= 0.1;
            });

            ctx.restore();
            animationId = requestAnimationFrame(animate);
        }

        window.addEventListener('mousedown', handleClicks);
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
